  ctx.beginPath();ctx.moveTo(r,0);ctx.lineTo(180-r,0);ctx.quadraticCurveTo(180,0,180,r);
  ctx.lineTo(180,180-r);ctx.quadraticCurveTo(180,180,180-r,180);
  ctx.lineTo(r,180);ctx.quadraticCurveTo(0,180,0,180-r);

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>

<script>
const e=React.createElement;
const {useState,useEffect,useRef,Fragment}=React;

const LS={
  get:(k)=>{try{const v=localStorage.getItem(k);return v?JSON.parse(v):null;}catch{return null;}},
  set:(k,v)=>{try{localStorage.setItem(k,JSON.stringify(v));}catch{}},
  del:(k)=>{try{localStorage.removeItem(k);}catch{}},
};

const TASKS_KEY='dr-tasks-v1';
const SCHEDULE_KEY='dr-schedule-v1';
const RESULTS_KEY='dr-results-v1';
const TIMER_KEY='dr-timer-v1';
const PRESETS_KEY='dr-presets-v1';
const TASK_CATS_KEY='dr-task-cats-v1';
const DEFAULT_PRESETS=['ミーティング','資料作成','メール対応','企画・検討','移動','休憩'];
const DEFAULT_TASK_CATS=['請求書','経費','会議','報告書','その他'];
const MONTHS=['1月','2月','3月','4月','5月','6月','7月','8月','9月','10月','11月','12月'];
const GAS_URL='https://script.google.com/macros/s/AKfycbzh85JBovXBgtFQiTJkph5wtjFTQqlOhVlHlzAGjnwy5z-_AaqKljEb9-aaAzI3b6HY/exec';

function getTodayStr(){
  const now=new Date();
  const jst=new Date(now.getTime()+9*60*60*1000);
  return jst.toISOString().slice(0,10);
}
function getTimeStr(d){return d.toTimeString().slice(0,5);}
function formatDate(d){return new Date(d).toLocaleDateString('ja-JP',{year:'numeric',month:'long',day:'numeric',weekday:'short'});}
function formatDateShort(d){return new Date(d).toLocaleDateString('ja-JP',{month:'numeric',day:'numeric',weekday:'short'});}
function timeToMin(t){if(!t)return 0;const[h,m]=t.split(':').map(Number);return h*60+m;}
function calcDur(s,e2){if(!s||!e2)return null;const d=timeToMin(e2)-timeToMin(s);if(d<=0)return null;const h=Math.floor(d/60),m=d%60;return h===0?`${m}分`:m===0?`${h}時間`:`${h}時間${m}分`;}
function calcMins(s,e2){if(!s||!e2)return 0;const d=timeToMin(e2)-timeToMin(s);return d>0?d:0;}
function fmtTotal(mins){if(!mins||mins<=0)return null;const h=Math.floor(mins/60),m=mins%60;return h===0?`${m}分`:m===0?`${h}時間`:`${h}時間${m}分`;}
function fmtElapsed(secs){const h=Math.floor(secs/3600),m=Math.floor((secs%3600)/60),s=secs%60;if(h>0)return`${h}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;return`${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;}
function isOverdue(d){return d?d<getTodayStr():false;}
function uid(){return Date.now()+Math.random();}

const PRIORITY={high:{label:'高',color:'#c87060',bg:'#fdecea'},medium:{label:'中',color:'#d4a843',bg:'#fdf6e8'},low:{label:'低',color:'#6b9e78',bg:'#edf7f0'}};
const SCH_COLOR='#7b8ec8';
const RES_COLOR='#6b9e78';
const BAR_COLORS=['#d4a843','#6b9e78','#7b8ec8','#c87060','#8f6fbd','#4fa8a8','#c4895a','#b06090'];

function Card({style,children}){return e('div',{style:{background:'white',borderRadius:'14px',boxShadow:'0 2px 10px rgba(44,36,22,.07)',...style}},children);}
function SL({text}){return e('div',{style:{fontSize:'10px',letterSpacing:'3px',opacity:0.4,marginBottom:'12px'}},text);}

function DatePicker({value,onChange,max,label,totalMins}){
  const isToday=value===getTodayStr();
  return e(Card,{style:{padding:'14px 16px',marginBottom:'16px'}},
    label&&e('div',{style:{fontSize:'10px',letterSpacing:'3px',opacity:0.4,marginBottom:'8px'}},label),
    e('div',{style:{display:'flex',alignItems:'center',gap:'10px'}},
      e('input',{type:'date',value,max:max||'9999-12-31',onChange:ev=>onChange(ev.target.value),style:{flex:1,border:'none',outline:'none',fontSize:'15px',color:'#2c2416',background:'transparent'}}),
      !isToday&&e('button',{onClick:()=>onChange(getTodayStr()),style:{padding:'5px 12px',borderRadius:'14px',border:'1.5px solid #d4a843',background:'transparent',color:'#d4a843',fontSize:'11px'}},'今日')
    ),
    e('div',{style:{display:'flex',justifyContent:'space-between',marginTop:'6px'}},
      e('span',{style:{fontSize:'12px',opacity:0.5}},formatDate(value),isToday&&e('span',{style:{marginLeft:'8px',color:'#d4a843',fontWeight:'700'}},'● 今日')),
      totalMins>0&&e('span',{style:{fontSize:'11px',color:'#8a6a2e',fontWeight:'700',background:'#fdf6e8',padding:'2px 10px',borderRadius:'10px'}},`合計 ${fmtTotal(totalMins)}`)
    )
  );
}

function TimeRow({item,onUpdate,onDelete,accentColor,presets,autoOpen,onAutoOpenDone}){
  const [open,setOpen]=useState(false);
  useEffect(()=>{if(autoOpen){setOpen(true);if(onAutoOpenDone)onAutoOpenDone();}},[autoOpen]);
  const dur=calcDur(item.startTime,item.endTime);
  return e('div',null,
    e('div',{onClick:()=>setOpen(true),style:{display:'flex',alignItems:'center',gap:'10px',padding:'11px 14px',background:'white',borderRadius:'12px',marginBottom:'7px',boxShadow:'0 1px 6px rgba(44,36,22,.06)',borderLeft:`4px solid ${accentColor}`,cursor:'pointer'}},
      e('div',{style:{flex:1}},
        e('div',{style:{fontSize:'14px',color:'#2c2416',marginBottom:'2px'}},item.title||'（未入力）'),
        e('div',{style:{fontSize:'11px',color:'#8a6a2e'}},
          item.startTime&&item.endTime?`${item.startTime} → ${item.endTime}`:item.startTime||'時間未設定',
          dur&&e('span',{style:{marginLeft:'6px',opacity:0.7}},dur),
          item.note&&e('span',{style:{marginLeft:'8px',opacity:0.45}},`📝 ${item.note}`)
        )
      ),
      e('span',{style:{fontSize:'14px',opacity:0.25}},'›')
    ),
    open&&ReactDOM.createPortal(e('div',{onClick:()=>setOpen(false),style:{position:'fixed',top:0,left:0,right:0,bottom:0,background:'rgba(0,0,0,0.45)',zIndex:1000,display:'flex',alignItems:'flex-end'}},
      e('div',{onClick:ev=>ev.stopPropagation(),style:{background:'#faf6f0',borderRadius:'20px 20px 0 0',padding:'20px 20px 36px',width:'100%',maxHeight:'82vh',overflowY:'auto',boxSizing:'border-box'}},
        e('div',{style:{width:'36px',height:'4px',background:'#ccc',borderRadius:'2px',margin:'0 auto 18px'}}),
        presets.length>0&&e('div',{style:{display:'flex',flexWrap:'wrap',gap:'5px',marginBottom:'12px'}},
          presets.map(p=>e('button',{key:p,onClick:()=>onUpdate({...item,title:p}),style:{padding:'5px 12px',borderRadius:'14px',border:'none',fontSize:'12px',background:item.title===p?'#d4a843':'#f0ebe0',color:item.title===p?'#2c2416':'#6b5a3a',fontWeight:item.title===p?'700':'400'}},p))
        ),
        e('input',{type:'text',value:item.title,onChange:ev=>onUpdate({...item,title:ev.target.value}),placeholder:'内容を入力…',autoFocus:true,
          style:{width:'100%',border:'none',borderBottom:'2px solid #e8dfd0',outline:'none',fontSize:'16px',color:'#2c2416',background:'transparent',padding:'4px 0 10px',marginBottom:'14px',boxSizing:'border-box'}}),
        e('div',{style:{display:'flex',alignItems:'center',gap:'10px',marginBottom:'14px'}},
          e('input',{type:'time',value:item.startTime||'',onChange:ev=>onUpdate({...item,startTime:ev.target.value}),style:{flex:1,border:'none',outline:'none',fontSize:'15px',color:'#2c2416',background:'#f0ebe0',padding:'8px 10px',borderRadius:'10px'}}),
          e('span',{style:{fontSize:'13px',opacity:0.4,fontWeight:'700'}},'→'),
          e('input',{type:'time',value:item.endTime||'',onChange:ev=>onUpdate({...item,endTime:ev.target.value}),style:{flex:1,border:'none',outline:'none',fontSize:'15px',color:'#2c2416',background:'#f0ebe0',padding:'8px 10px',borderRadius:'10px'}}),
          dur&&e('span',{style:{fontSize:'12px',color:'#8a6a2e',fontWeight:'700',background:'#fdf6e8',padding:'4px 8px',borderRadius:'8px',whiteSpace:'nowrap'}},dur)
        ),
        e('input',{type:'text',value:item.note||'',onChange:ev=>onUpdate({...item,note:ev.target.value}),placeholder:'メモ（任意）',
          style:{width:'100%',border:'none',borderBottom:'1px solid #e8dfd0',outline:'none',fontSize:'14px',color:'#2c2416',background:'transparent',padding:'4px 0 8px',marginBottom:'20px',boxSizing:'border-box'}}),
        e('div',{style:{display:'flex',gap:'10px'}},
          e('button',{onClick:()=>{onDelete(item.id);setOpen(false);},style:{flex:1,padding:'13px',borderRadius:'12px',border:'none',background:'#fdecea',color:'#c87060',fontSize:'14px',fontWeight:'700'}},'削除'),
          e('button',{onClick:()=>setOpen(false),style:{flex:2,padding:'13px',borderRadius:'12px',border:'none',background:'#2c2416',color:'#f5f0e8',fontSize:'14px',fontWeight:'700'}},'完了')
        )
      )
    ),document.body)
  );
}

function TaskItem({task,onToggle,onEdit}){
  const p=PRIORITY[task.priority]||PRIORITY.medium;
  const overdue=isOverdue(task.dueDate)&&!task.done;
  return e('div',{onClick:()=>!task.done&&onEdit(task),style:{display:'flex',alignItems:'flex-start',gap:'10px',padding:'12px 14px',background:'white',borderRadius:'14px',marginBottom:'8px',boxShadow:'0 1px 6px rgba(44,36,22,.06)',borderLeft:`4px solid ${task.done?'#ddd':p.color}`,opacity:task.done?0.55:1,cursor:task.done?'default':'pointer'}},
    e('button',{onClick:ev=>{ev.stopPropagation();onToggle(task.id);},style:{width:'22px',height:'22px',borderRadius:'6px',border:`2px solid ${task.done?'#bbb':p.color}`,background:task.done?'#bbb':'transparent',flexShrink:0,marginTop:'1px',display:'flex',alignItems:'center',justifyContent:'center',color:'white',fontSize:'12px',fontWeight:'700'}},task.done&&'✓'),
    e('div',{style:{flex:1}},
      e('div',{style:{fontSize:'15px',textDecoration:task.done?'line-through':'none',color:task.done?'#aaa':'#2c2416',marginBottom:'4px'}},task.title||'（タスク名なし）'),
      e('div',{style:{display:'flex',gap:'5px',alignItems:'center',flexWrap:'wrap'}},
        e('span',{style:{fontSize:'10px',fontWeight:'700',color:p.color,background:p.bg,padding:'2px 8px',borderRadius:'8px'}},p.label),
        task.category&&e('span',{style:{fontSize:'10px',fontWeight:'700',color:'#8a6a2e',background:'#fdf6e8',padding:'2px 8px',borderRadius:'8px'}},task.category),
        task.month&&e('span',{style:{fontSize:'10px',fontWeight:'700',color:'white',background:'#7b8ec8',padding:'2px 8px',borderRadius:'8px'}},task.month),
        task.dueDate&&e('span',{style:{fontSize:'11px',color:overdue?'#c87060':'#8a6a2e',fontWeight:overdue?'700':'400'}},overdue?`⚠️ ${formatDateShort(task.dueDate)}`:`📅 ${formatDateShort(task.dueDate)}`)
      )
    ),
    !task.done&&e('span',{style:{fontSize:'14px',opacity:0.25}},'›')
  );
}

function App(){
  const today=getTodayStr();
  const [tasks,setTasks]=useState([]);
  const [taskFilter,setTaskFilter]=useState('active');
  const [taskCatFilter,setTaskCatFilter]=useState('');
  const [taskMonthFilter,setTaskMonthFilter]=useState('');
  const [showNewTask,setShowNewTask]=useState(false);
  const [ntTitle,setNtTitle]=useState('');
  const [ntPriority,setNtPriority]=useState('medium');
  const [ntDue,setNtDue]=useState('');
  const [ntCategory,setNtCategory]=useState('');
  const [ntMonth,setNtMonth]=useState('');
  const [ntMemo,setNtMemo]=useState('');
  const [ntEstMin,setNtEstMin]=useState('');
  const [taskCats,setTaskCats]=useState(DEFAULT_TASK_CATS);
  const [schedules,setSchedules]=useState({});
  const [schDate,setSchDate]=useState(today);
  const [results,setResults]=useState({});
  const [resDate,setResDate]=useState(today);
  const [timerActivity,setTimerActivity]=useState('');
  const [timerStartStr,setTimerStartStr]=useState('');
  const [timerStartISO,setTimerStartISO]=useState(null);
  const [elapsed,setElapsed]=useState(0);
  const [timerRunning,setTimerRunning]=useState(false);
  const [dayDate,setDayDate]=useState(today);
  const [presets,setPresets]=useState(DEFAULT_PRESETS);
  const [newPreset,setNewPreset]=useState('');
  const [view,setView]=useState('tasks');
  const [editingTask,setEditingTask]=useState(null);
  const [etTitle,setEtTitle]=useState('');
  const [etPriority,setEtPriority]=useState('medium');
  const [etDue,setEtDue]=useState('');
  const [etCat,setEtCat]=useState('');
  const [etMonth,setEtMonth]=useState('');
  const [etMemo,setEtMemo]=useState('');
  const [etEstMin,setEtEstMin]=useState('');
  // Calendar
  const [calDate,setCalDate]=useState(today);
  const [calEvents,setCalEvents]=useState([]);
  const [calLoading,setCalLoading]=useState(false);
  const [calError,setCalError]=useState('');
  const [calImportDone,setCalImportDone]=useState(false);
  const [calViewMode,setCalViewMode]=useState('week');
  const [syncing,setSyncing]=useState(false);
  const [syncMsg,setSyncMsg]=useState('');
  const tickRef=useRef(null);
  const syncTimersRef=useRef({});

  useEffect(()=>{
    const t=LS.get(TASKS_KEY);if(t)setTasks(t);
    const s=LS.get(SCHEDULE_KEY);if(s)setSchedules(s);
    const r=LS.get(RESULTS_KEY);if(r)setResults(r);
    const p=LS.get(PRESETS_KEY);if(p)setPresets(p);
    const tc=LS.get(TASK_CATS_KEY);if(tc)setTaskCats(tc);
    const tr=LS.get(TIMER_KEY);
    if(tr){setTimerActivity(tr.activity||'');setTimerStartStr(tr.startStr);setTimerStartISO(tr.startISO);setTimerRunning(true);setElapsed(Math.max(0,Math.floor((Date.now()-new Date(tr.startISO).getTime())/1000)));}
    // アプリ起動時に今日のカレンダーを自動取得
    autoFetchCalendar(getTodayStr());
  },[]);

  // カレンダー自動取得（スケジュールに静かに反映）
  const autoFetchCalendar=async(date)=>{
    try{
      const res=await fetch(`${GAS_URL}?date=${date}`);
      const data=await res.json();
      if(!Array.isArray(data))return;
      // 時間付きイベントのみスケジュールに自動追加（重複チェックあり）
      const timed=data.filter(ev=>!ev.allDay&&ev.startTime&&ev.endTime);
      if(!timed.length)return;
      setSchedules(prev=>{
        const existing=prev[date]||[];
        const existingTitles=existing.map(e=>e.title+e.startTime);
        const newItems=timed
          .filter(ev=>!existingTitles.includes(ev.summary+ev.startTime))
          .map(ev=>({id:uid(),title:ev.summary,startTime:ev.startTime,endTime:ev.endTime,note:''}));
        if(!newItems.length)return prev;
        const merged=[...existing,...newItems].sort((a,b)=>timeToMin(a.startTime||'00:00')-timeToMin(b.startTime||'00:00'));
        const updated={...prev,[date]:merged};
        LS.set(SCHEDULE_KEY,updated);
        return updated;
      });
    }catch(err){}
  };

  // スケジュールタブを開いたときも自動取得
  useEffect(()=>{
    if(view==='schedule'){
      autoFetchCalendar(schDate);
    }
  },[view,schDate]);

  // 1ヶ月分まとめて取得
  const [monthFetching,setMonthFetching]=useState(false);
  const fetchMonth=async(dateStr)=>{
    const month=dateStr.slice(0,7);
    setMonthFetching(true);
    try{
      const res=await fetch(`${GAS_URL}?month=${month}`);
      const data=await res.json();
      if(!Array.isArray(data)||!data.length){
        setMonthFetching(false);
        return;
      }
      const byDate={};
      data.forEach(ev=>{
        if(!ev.date||ev.allDay||!ev.startTime||!ev.endTime)return;
        if(!byDate[ev.date])byDate[ev.date]=[];
        byDate[ev.date].push(ev);
      });
      if(Object.keys(byDate).length){
        setSchedules(prev=>{
          const updated={...prev};
          Object.entries(byDate).forEach(([date,evs])=>{
            const existing=updated[date]||[];
            const existingKeys=existing.map(e=>e.title+e.startTime);
            const newItems=evs
              .filter(ev=>!existingKeys.includes(ev.summary+ev.startTime))
              .map(ev=>({id:uid(),title:ev.summary,startTime:ev.startTime,endTime:ev.endTime,note:''}));
            if(!newItems.length)return;
            const merged=[...existing,...newItems].sort((a,b)=>timeToMin(a.startTime||'00:00')-timeToMin(b.startTime||'00:00'));
            updated[date]=merged;
          });
          LS.set(SCHEDULE_KEY,updated);
          return updated;
        });
      }
    }catch(err){
      console.error('fetchMonth error:',err);
    }
    setMonthFetching(false);
  };

  // タイマー：開始時刻との差分で正確に計測
  useEffect(()=>{
    if(timerRunning&&timerStartISO){
      const calc=()=>setElapsed(Math.max(0,Math.floor((Date.now()-new Date(timerStartISO).getTime())/1000)));
      calc();
      tickRef.current=setInterval(calc,1000);
    }else{clearInterval(tickRef.current);}
    return()=>clearInterval(tickRef.current);
  },[timerRunning,timerStartISO]);

  const syncTasksToGAS=(list)=>{
    const params=new URLSearchParams({action:'syncTasks',tasks:JSON.stringify(list)});
    fetch(`${GAS_URL}?${params}`).catch(()=>{});
  };
  const saveTasks=(list)=>{setTasks(list);LS.set(TASKS_KEY,list);syncTasksToGAS(list);};
  const openTaskEdit=(task)=>{setEtTitle(task.title);setEtPriority(task.priority||'medium');setEtDue(task.dueDate||'');setEtCat(task.category||'');setEtMonth(task.month||'');setEtMemo(task.memo||'');setEtEstMin(task.estMin||'');setEditingTask(task);};
  const closeTaskEdit=()=>setEditingTask(null);
  const saveTaskEdit=()=>{updateTask(editingTask.id,{title:etTitle,priority:etPriority,dueDate:etDue,category:etCat,month:etMonth,memo:etMemo,estMin:etEstMin});closeTaskEdit();};
  const deleteTaskEdit=()=>{deleteTask(editingTask.id);closeTaskEdit();};
  const saveTaskCats=(list)=>{setTaskCats(list);LS.set(TASK_CATS_KEY,list);};
  const addTask=()=>{if(!ntTitle.trim())return;saveTasks([{id:uid(),title:ntTitle.trim(),priority:ntPriority,dueDate:ntDue,category:ntCategory,month:ntMonth,memo:ntMemo,estMin:ntEstMin,done:false},...tasks]);setNtTitle('');setNtDue('');setNtPriority('medium');setNtCategory('');setNtMonth('');setNtMemo('');setNtEstMin('');setShowNewTask(false);};
  const toggleTask=(id)=>saveTasks(tasks.map(t=>t.id===id?{...t,done:!t.done}:t));
  const updateTask=(id,fields)=>saveTasks(tasks.map(t=>t.id===id?{...t,...fields}:t));
  const deleteTask=(id)=>saveTasks(tasks.filter(t=>t.id!==id));
  const sortedTasks=[...tasks].sort((a,b)=>{if(a.done!==b.done)return a.done?1:-1;const po={high:0,medium:1,low:2};return po[a.priority]-po[b.priority];});
  const filteredTasks=sortedTasks.filter(t=>{
    if(taskFilter==='done'&&!t.done)return false;
    if(taskFilter==='active'&&t.done)return false;
    if(taskCatFilter&&t.category!==taskCatFilter)return false;
    if(taskMonthFilter&&t.month!==taskMonthFilter)return false;
    return true;
  });
  const activeCnt=tasks.filter(t=>!t.done).length;
  const overdueCnt=tasks.filter(t=>!t.done&&isOverdue(t.dueDate)).length;

  const schSyncTimersRef=useRef({});
  const syncSchToGAS=(date,dayItems,immediate=false)=>{
    const doSync=()=>{
      const entries=(dayItems||[]).filter(r=>r.title||r.startTime).map(r=>({s:r.startTime||'',e:r.endTime||'',t:r.title||'',n:r.note||''}));
      const params=new URLSearchParams({action:'syncSchedules',date,entries:JSON.stringify(entries)});
      return fetch(`${GAS_URL}?${params}`).catch(()=>{});
    };
    if(immediate)return doSync();
    clearTimeout(schSyncTimersRef.current[date]);
    schSyncTimersRef.current[date]=setTimeout(doSync,5000);
  };
  const saveSch=(data,syncDate,immediate=false)=>{setSchedules(data);LS.set(SCHEDULE_KEY,data);if(syncDate!==undefined)syncSchToGAS(syncDate,data[syncDate]||[],immediate);};
  const schItems=schedules[schDate]||[];
  const [newSchId,setNewSchId]=useState(null);
  const addSch=()=>{const id=uid();const last=schItems[schItems.length-1];saveSch({...schedules,[schDate]:[...schItems,{id,title:'',startTime:last?.endTime||'',endTime:'',note:''}]},schDate);setNewSchId(id);};
